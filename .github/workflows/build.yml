name: Build OpenWrt for Cudy WR3000S

on:
  workflow_dispatch: # Позволяет запускать сборку вручную кнопкой

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev libncursesw5-dev zlib1g-dev gawk git gettext libssl-dev xsltproc rsync wget unzip qemu-utils
          
      - name: Download OpenWrt Image Builder
        run: |
          # Скачиваем официальный Image Builder для архитектуры ramips/mt7621
          # Ссылка указана на стабильную версию. При необходимости можно изменить версию в URL
          wget https://openwrt.org
          tar -xf openwrt-imagebuilder-23.05.5-ramips-mt7621.Linux-x86_64.tar.xz
          mv openwrt-imagebuilder-23.05.5-ramips-mt7621.Linux-x86_64 imagebuilder

      - name: Copy custom files
        run: |
          # Копируем наши скрипты настроек внутрь структуры Image Builder
          mkdir -p imagebuilder/files
          if [ -d "files" ]; then
            cp -r files/* imagebuilder/files/
            chmod +x imagebuilder/files/etc/uci-defaults/*
          fi

      - name: Compile Firmware
        run: |
          cd imagebuilder
          # Запуск сборки под конкретный профиль Cudy WR3000S v1 с вашими пакетами
          make image PROFILE=cudy_wr3000s-v1 PACKAGES="luci-i18n-base-ru luci-i18n-adblock-fast-ru ttyd" FILES="files/"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Cudy-WR3000S-Firmware
          path: imagebuilder/bin/targets/ramips/mt7621/*sysupgrade.bin
